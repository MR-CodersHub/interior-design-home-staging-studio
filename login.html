<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Verdant - Client Access Portal. Log in to view your design timeline, mood boards, and exclusive luxury curations.">
    <title>VERDANT | Client Portal Login</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="assets/images/favicon.png">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- FontAwesome / Lucide for Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Main Style Sheet -->
    <link rel="stylesheet" href="style.css?v=2">

    <style>
        /* Login Specific Styles */
        .login-section {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 100px 20px 40px 20px; /* Accounts for fixed navbar */
            box-sizing: border-box;
        }

        .auth-panel {
            background-color: var(--clr-bg-dark);
            border: var(--border-gold-thin);
            border-radius: var(--border-radius-lg);
            padding: 40px; /* Optimized padding */
            width: 100%;
            max-width: 500px;
            box-shadow: var(--box-shadow-premium);
            position: relative;
            overflow: hidden;
            transition: var(--transition-medium);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 25px; /* Optimized spacing */
        }

        .auth-header h2 {
            font-family: var(--font-serif);
            font-size: 2rem; /* Optimized size */
            color: var(--clr-text-main);
            margin-bottom: 8px;
        }

        .auth-header p {
            color: var(--clr-text-muted);
            font-size: 0.9rem;
        }

        .password-input-group {
            position: relative;
            display: flex;
            align-items: center;
        }

        .password-toggle-btn {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--clr-text-muted);
            cursor: pointer;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-fast);
        }

        .password-toggle-btn:hover {
            color: var(--clr-gold-accent);
        }

        .auth-footer-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 20px; /* Optimized spacing */
        }

        .auth-link {
            color: var(--clr-text-muted);
            font-size: 0.85rem;
            text-decoration: none;
            transition: var(--transition-fast);
            cursor: pointer;
        }

        .auth-link:hover {
            color: var(--clr-gold-accent);
        }

        .auth-form-container {
            display: block;
            animation: fadeIn 0.4s ease forwards;
        }

        .auth-form-container.hidden {
            display: none;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-section {
                padding: 90px 15px 30px 15px;
            }

            .auth-panel {
                padding: 30px 20px;
            }

            .auth-header h2 {
                font-size: 1.8rem;
            }
        }

        /* Subtle Luxury Auth Divider */
        .auth-divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 18px 0;
            color: var(--clr-text-muted);
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
        }

        .auth-divider::before,
        .auth-divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid rgba(197, 168, 128, 0.15);
        }

        .auth-divider:not(:empty)::before {
            margin-right: 15px;
        }

        .auth-divider:not(:empty)::after {
            margin-left: 15px;
        }

        body.light-mode .auth-divider::before,
        body.light-mode .auth-divider::after {
            border-bottom-color: rgba(139, 115, 85, 0.15);
        }

        /* Social Sign In Options Group */
        .social-login-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-top: 15px;
            margin-bottom: 20px;
        }

        @media (max-width: 480px) {
            .social-login-container {
                grid-template-columns: 1fr;
                gap: 10px;
            }
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            height: 42px;
            background: rgba(15, 16, 15, 0.4);
            border: 1px solid rgba(197, 168, 128, 0.25);
            border-radius: var(--border-radius-sm);
            color: var(--clr-text-main);
            font-family: var(--font-sans);
            font-size: 0.78rem;
            font-weight: 500;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            padding: 0 10px;
            white-space: nowrap;
        }

        .social-btn:hover,
        .social-btn:focus {
            border-color: var(--clr-gold-accent);
            background-color: rgba(197, 168, 128, 0.08);
            box-shadow: 0 4px 15px rgba(197, 168, 128, 0.18);
            color: var(--clr-gold-accent);
            outline: none;
        }

        body.light-mode .social-btn {
            background: rgba(255, 255, 255, 0.6);
            border-color: rgba(139, 115, 85, 0.25);
            color: var(--clr-text-main);
        }

        body.light-mode .social-btn:hover,
        body.light-mode .social-btn:focus {
            background-color: rgba(139, 115, 85, 0.06);
            border-color: var(--clr-gold-accent);
            color: var(--clr-gold-accent);
            box-shadow: 0 4px 15px rgba(139, 115, 85, 0.12);
        }

        .social-btn svg {
            width: 16px;
            height: 16px;
            fill: currentColor;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body class="luxury-theme dark-mode">
    <script>
        // Immediately apply saved theme to avoid visual flash
        const savedTheme = localStorage.getItem("theme-preference");
        if (savedTheme === "light") {
            document.body.classList.remove("dark-mode");
            document.body.classList.add("light-mode");
        } else if (savedTheme === "dark") {
            document.body.classList.remove("light-mode");
            document.body.classList.add("dark-mode");
        } else {
            const systemPrefersLight = window.matchMedia("(prefers-color-scheme: light)").matches;
            if (systemPrefersLight) {
                document.body.classList.remove("dark-mode");
                document.body.classList.add("light-mode");
            }
        }
    </script>

    <!-- HEADER / NAVIGATION -->
    <header class="navbar-header">
        <div class="nav-container">
            <a href="index.html" class="logo">
                <img src="assets/images/logo.png" alt="Verdant Logo" class="brand-logo-img">
                <div class="brand-text">
                    <span class="logo-main">VERDANT</span>
                </div>
            </a>

            <div class="nav-actions">
                <button class="theme-toggle-btn" id="themeToggleBtn" aria-label="Toggle Light/Dark Theme">
                    <i data-lucide="sun" class="sun-icon"></i>
                    <i data-lucide="moon" class="moon-icon"></i>
                </button>
                <button class="rtl-toggle-btn" id="rtlToggleBtn" aria-label="Toggle Layout Direction">
                    <i data-lucide="arrow-left-right"></i>
                </button>
            </div>
        </div>
    </header>

    <!-- AUTHENTICATION SECTION -->
    <section class="login-section">
        <div class="auth-panel animate-on-scroll slide-up">

            <!-- LOGIN FORM -->
            <div id="loginFormContainer" class="auth-form-container">
                <div class="auth-header">
                    <h2>Portal Access</h2>
                    <p>Enter your credentials to access your portal</p>
                </div>
                <form class="luxury-minimal-form"
                    onsubmit="event.preventDefault(); window.location.href='user-dashboard.html';">
                    <div class="form-group-minimal" style="margin-bottom: 20px;">
                        <input type="email" name="email" required placeholder=" " autocomplete="email">
                        <label>Email Address</label>
                    </div>

                    <div class="form-group-minimal password-input-group">
                        <input type="password" id="loginPassword" name="password" required placeholder=" "
                            autocomplete="current-password">
                        <label>Password</label>
                        <button type="button" class="password-toggle-btn"
                            onclick="togglePassword('loginPassword', 'eyeIconLogin')"
                            aria-label="Toggle password visibility">
                            <i data-lucide="eye" id="eyeIconLogin"></i>
                        </button>
                    </div>

                    <div class="auth-footer-links">
                        <label
                            style="display: flex; align-items: center; gap: 8px; cursor: pointer; font-size: 0.85rem; color: var(--clr-text-muted);">
                            <input type="checkbox" style="accent-color: var(--clr-gold-accent);"> Remember me
                        </label>
                        <a class="auth-link" onclick="switchAuthView('reset')">Forgot Password?</a>
                    </div>

                    <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">
                        <span>Access Portal</span>
                    </button>

                    <div class="auth-divider">Or continue with</div>

                    <div class="social-login-container">
                        <button type="button" class="social-btn" onclick="event.preventDefault(); window.location.href='user-dashboard.html';">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.06H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.94l2.85-2.22.81-.63z" />
                                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.06l3.66 2.84c.87-2.6 3.3-4.52 6.16-4.52z" />
                            </svg>
                            <span>Continue with Google</span>
                        </button>
                        <button type="button" class="social-btn" onclick="event.preventDefault(); window.location.href='user-dashboard.html';">
                            <svg viewBox="0 0 23 23" xmlns="http://www.w3.org/2000/svg">
                                <path d="M0 0h11v11H0zM12 0h11v11H12zM0 12h11v11H0zM12 12h11v11H12z" />
                            </svg>
                            <span>Continue with Microsoft</span>
                        </button>
                        <button type="button" class="social-btn" onclick="event.preventDefault(); window.location.href='user-dashboard.html';">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M15.97 4.17c.66-.81 1.11-1.93.99-3.06-1 .04-2.23.67-2.95 1.51-.64.73-1.2 1.87-1.05 2.98 1.1.09 2.25-.56 3.01-1.43z" />
                            </svg>
                            <span>Continue with Apple</span>
                        </button>
                        <button type="button" class="social-btn" onclick="event.preventDefault(); window.location.href='user-dashboard.html';">
                            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                <path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.779-1.75-1.75s.784-1.75 1.75-1.75 1.75.779 1.75 1.75-.784 1.75-1.75 1.75zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z" />
                            </svg>
                            <span>Continue with LinkedIn</span>
                        </button>
                    </div>

                    <div style="text-align: center; margin-top: 25px;">
                        <span style="color: var(--clr-text-muted); font-size: 0.85rem;">Don't have an account? </span>
                        <a href="contact.html" class="auth-link" style="color: var(--clr-gold-accent);">Request
                            Invite</a>
                    </div>
                </form>
            </div>

            <!-- RESET PASSWORD FORM -->
            <div id="resetFormContainer" class="auth-form-container hidden">
                <div class="auth-header">
                    <h2>Reset Password</h2>
                    <p>Enter your email to receive recovery instructions</p>
                </div>
                <form class="luxury-minimal-form"
                    onsubmit="event.preventDefault(); alert('Password recovery instructions sent to your email.'); switchAuthView('login');">
                    <div class="form-group-minimal" style="margin-bottom: 20px;">
                        <input type="email" name="reset-email" required placeholder=" ">
                        <label>Registered Email Address</label>
                    </div>

                    <button type="submit" class="btn btn-primary"
                        style="width: 100%; justify-content: center; margin-bottom: 20px;">
                        <span>Send Recovery Link</span>
                    </button>

                    <div style="text-align: center;">
                        <a class="auth-link" onclick="switchAuthView('login')"
                            style="display: inline-flex; align-items: center; gap: 8px;">
                            <i data-lucide="arrow-left" style="width: 16px; height: 16px;"></i> Back to Login
                        </a>
                    </div>
                </form>
            </div>

        </div>
    </section>


    <!-- Lucide Icon Loader and Main JS Engine -->
    <script>
        window.addEventListener('load', () => {
            if (window.lucide) window.lucide.createIcons();
        });

        // Authentication View Switcher
        function switchAuthView(view) {
            const loginForm = document.getElementById('loginFormContainer');
            const resetForm = document.getElementById('resetFormContainer');

            if (view === 'reset') {
                loginForm.classList.add('hidden');
                resetForm.classList.remove('hidden');
            } else {
                resetForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
            }
        }

        // Password Visibility Toggle
        function togglePassword(inputId, iconId) {
            const input = document.getElementById(inputId);
            const currentIcon = document.getElementById(iconId);

            const newIcon = document.createElement('i');
            newIcon.id = iconId;

            if (input.type === "password") {
                input.type = "text";
                newIcon.setAttribute("data-lucide", "eye-off");
            } else {
                input.type = "password";
                newIcon.setAttribute("data-lucide", "eye");
            }

            currentIcon.replaceWith(newIcon);

            // Re-render icons
            if (window.lucide) {
                lucide.createIcons();
            }
        }
    </script>
    <script src="script.js"></script>
</body>

</html>
